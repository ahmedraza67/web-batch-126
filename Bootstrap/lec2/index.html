<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Document</title>
  </head>
  <body>
    <!-- class="border border-2 border-danger h-75 w-100 p-6 m-5 pt pb ms me mt mb px-5 py-5 mx my" -->
    <div style="height: 100vh; width: 100%">
      <img
        class=""
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxOcKVM5G0ZnQLNyIB5jEu8RKcr3uHyHZDH6q8WZfJxloENl9RQ9y4EEOq&s=10"
        alt=""
      />
      <h1 class="mx-auto" style="width: fit-content">hello</h1>
      <h1 class="outline outline-2 outline-danger">hello</h1>

      <div class="progress">
        <div class="progress-bar" style="width: 29%; background-color: blue">
          8%
        </div>
      </div>
      <div class="progress">
        <div
          class="progress-bar progress-bar-striped"
          style="width: 29%; background-color: blue"
        >
          8%
        </div>
      </div>
      <div class="progress">
        <div
          class="progress-bar progress-bar-striped progress-bar-animated"
          style="width: 29%; background-color: blue"
        >
          8%
        </div>
      </div>

      <div class="spinner-border spinner-border-lg"></div>

      <!-- Carousel -->
      <div id="demo" class="carousel slide" data-bs-ride="carousel">
        <!-- Indicators/dots -->
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#demo"
            data-bs-slide-to="0"
            class="active"
          ></button>
          <button
            type="button"
            data-bs-target="#demo"
            data-bs-slide-to="1"
          ></button>
          <button
            type="button"
            data-bs-target="#demo"
            data-bs-slide-to="2"
          ></button>
        </div>

        <!-- The slideshow/carousel -->
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxOcKVM5G0ZnQLNyIB5jEu8RKcr3uHyHZDH6q8WZfJxloENl9RQ9y4EEOq&s=10"
              alt="Los Angeles"
              class="d-block w-100"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxOcKVM5G0ZnQLNyIB5jEu8RKcr3uHyHZDH6q8WZfJxloENl9RQ9y4EEOq&s=10"
              alt="Chicago"
              class="d-block w-100"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxOcKVM5G0ZnQLNyIB5jEu8RKcr3uHyHZDH6q8WZfJxloENl9RQ9y4EEOq&s=10"
              alt="New York"
              class="d-block w-100"
            />
          </div>
        </div>

        <!-- Left and right controls/icons -->
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#demo"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#demo"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </body>
</html>
